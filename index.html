<html lang="en">
  <head>

  <meta name="theme-color" content="#0b3c5d" />

  <!-- Resource hints: resolve Firebase DNS before it's needed, eliminating render-blocking -->
  <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
  <link rel="dns-prefetch" href="https://securetoken.googleapis.com" />
  <link rel="dns-prefetch" href="https://www.googleapis.com" />
  <link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
  <!-- LCP image origin — preconnect eliminates TCP handshake from critical path -->
  <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />
  <!-- Firebase auth iframe origin -->
  <link rel="preconnect" href="https://device-streaming-63fbf30c.firebaseapp.com" crossorigin />
  <!-- Google Fonts origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- PWA Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Dynamically adjustable favicon configuration for multiple screen sizes and devices -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>PathLab OS — Digital Pathology Laboratory Portal</title>
  <meta name="description" content="PathLab OS is a clinical digital pathology laboratory management system. Manage patients, reports, doctors, and lab analytics from one secure dashboard." />
  <meta name="keywords" content="pathology lab software, lab management system, digital pathology, patient reports, clinical lab portal" />
  <meta property="og:title" content="PathLab OS — Digital Pathology Laboratory Portal" />
  <meta property="og:description" content="Manage your pathology lab digitally. Patient records, test reports, doctor management, and real-time analytics in one place." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://healthcare-os.pages.dev" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="PathLab OS" />
  <meta name="twitter:description" content="Digital Pathology Laboratory Portal — patient reports, lab analytics, doctor management." />
    <script>
      (function() {
        try {
          var s = localStorage.getItem('pathologyos_settings');
          var themeId = 'navy';
          if (s) {
            var parsed = JSON.parse(s);
            if (parsed && parsed.themeId) {
              themeId = parsed.themeId;
            }
          }
          var themes = {
            navy: { primary: '#00263f', primaryContainer: '#0b3c5d', onPrimary: '#ffffff', onPrimaryContainer: '#7fa7cd', secondary: '#006a66', secondaryContainer: '#84f2eb', onSecondary: '#ffffff' },
            teal: { primary: '#064e3b', primaryContainer: '#0f766e', onPrimary: '#ffffff', onPrimaryContainer: '#a7f3d0', secondary: '#0d9488', secondaryContainer: '#ccfbf1', onSecondary: '#ffffff' },
            amethyst: { primary: '#311042', primaryContainer: '#581c87', onPrimary: '#ffffff', onPrimaryContainer: '#e9d5ff', secondary: '#7e22ce', secondaryContainer: '#f3e8ff', onSecondary: '#ffffff' },
            slate: { primary: '#1e293b', primaryContainer: '#334155', onPrimary: '#ffffff', onPrimaryContainer: '#cbd5e1', secondary: '#475569', secondaryContainer: '#f1f5f9', onSecondary: '#ffffff' },
            maroon: { primary: '#4c0519', primaryContainer: '#881337', onPrimary: '#ffffff', onPrimaryContainer: '#fecdd3', secondary: '#b91c1c', secondaryContainer: '#fee2e2', onSecondary: '#ffffff' }
          };
          var t = themes[themeId] || themes.navy;
          var r = document.documentElement;
          r.style.setProperty('--primary', t.primary);
          r.style.setProperty('--primary-container', t.primaryContainer);
          r.style.setProperty('--on-primary', t.onPrimary);
          r.style.setProperty('--on-primary-container', t.onPrimaryContainer);
          r.style.setProperty('--secondary', t.secondary);
          r.style.setProperty('--secondary-container', t.secondaryContainer);
          r.style.setProperty('--on-secondary', t.onSecondary);
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Native splash screen: shows instantly (0ms) while JS bundle loads. React removes it on mount. -->
      <div id="app-splash" style="position:fixed;inset:0;z-index:9999;background:#0b3c5d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;">
        <img src="/android-chrome-192x192.png" alt="PathLab OS" width="88" height="88" style="border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.4);" />
        <p style="color:#ffffff;font-family:system-ui,sans-serif;font-size:22px;font-weight:700;margin:20px 0 6px;">PathLab OS</p>
        <p style="color:#7fa7cd;font-family:system-ui,sans-serif;font-size:13px;margin:0 0 36px;">Digital Pathology Laboratory Portal</p>
        <!-- Progress bar -->
        <div style="width:160px;height:3px;background:rgba(255,255,255,0.15);border-radius:999px;overflow:hidden;">
          <div id="splash-bar" style="height:100%;width:0%;background:#7fa7cd;border-radius:999px;transition:width 0.3s ease;"></div>
        </div>
        <script>
          // Animate the splash bar while JS loads
          (function(){
            var bar = document.getElementById('splash-bar');
            var w = 0;
            var iv = setInterval(function(){
              w += Math.random() * 15;
              if(w > 85) w = 85;
              bar.style.width = w + '%';
            }, 200);
            window.__splashInterval = iv;
          })();
        </script>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
