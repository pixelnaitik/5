name: Build and Deploy
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm install
      - name: Lint Code
        run: npm run lint
      - name: Build Project
        run: npm run build
      - name: Diagnostic Secret Check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is EMPTY or NOT DEFINED in your GitHub Repository Secrets!"
          else
            echo "CLOUDFLARE_API_TOKEN is defined."
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is EMPTY or NOT DEFINED in your GitHub Repository Secrets!"
          else
            echo "CLOUDFLARE_ACCOUNT_ID is defined."
          fi
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=healthcare-os
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
